name: CI

# Runs on every push and pull request targeting main. NOTE: Netlify auto-
# deploys on every push to main regardless of this workflow's result -- CI
# runs after the push has already landed, so this is an alarm, not a gate.
# See README.md / PROJECT_MASTER.md (B3 session) for the documented,
# not-yet-enabled option to add real pre-merge gating via branch protection.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  ascii-guard:
    name: ASCII Guard
    runs-on: ubuntu-latest
    # Baseline zeroed 2026-07-15 (B5 item 5 cleanup session -- see
    # PROJECT_MASTER.md). Blocking again, same as the local staged-mode
    # hook: a new non-ASCII byte in any tracked .ts/.tsx file fails this
    # job. If this ever needs to go report-only again, restore the
    # summary-wrapper pattern still used by the lint job below.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan all tracked .ts/.tsx files for non-ASCII characters
        run: bash scripts/pre-commit-ascii-guard.sh --tracked

  guardrail-fixtures:
    name: Guardrail Pattern Fixtures
    runs-on: ubuntu-latest
    # Deterministic, zero-API-cost regression check for outputGuardrails.ts's
    # VIOLATION_PATTERNS -- added 2026-07-17 after the AL02 "right here"
    # over-firing incident (5 real false positives logged before this
    # existed). Node 24 (not the build/lint jobs' Node 20) because the
    # fixture script is a .mts file executed directly via native TypeScript
    # stripping -- stable by default only from Node 23.6+; Node 20 cannot
    # run it at all. This job is independent of build/lint's Node version.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run guardrail pattern fixtures
        run: node scripts/guardrail-pattern-fixtures.mts

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Blocking again as of 2026-07-18 (no-explicit-any batch 3 -- see
    # PROJECT_MASTER.md). Both report-only conditions are now met:
    # @typescript-eslint/no-explicit-any is at zero (three justified,
    # line-scoped eslint-disable exceptions remain) and temp_working_version.ts
    # (the parsing-error file) is gone. A new lint error now fails this job,
    # same as the local pre-commit posture.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
